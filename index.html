<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TC Poker Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="loader">
    <div class="l-eyebrow">Torn City</div>
    <div class="l-title">Poker Analysis</div>
    <div class="l-sub">Session Intelligence</div>
    <div class="l-cards">
      <div class="lc b" id="lc0">A♠</div>
      <div class="lc r" id="lc1">K♥</div>
      <div class="lc b" id="lc2">Q♣</div>
      <div class="lc r" id="lc3">J♦</div>
      <div class="lc b" id="lc4">10♠</div>
    </div>
    <div class="l-clabel">Hands analysed</div>
    <div class="l-count" id="lnum">0</div>
    <div class="l-prog">
      <div class="l-prog-fill" id="lprog"></div>
    </div>
  </div>

  <div id="app">
    <div id="paste-wrap">
      <div class="paste-box">
        <div class="paste-suit">♠</div>
        <div class="paste-title">Analyse your session</div>
        <div class="paste-sub">Click below to paste your tracked session data from the TC Poker Tracker</div>
        <button class="go-btn" id="paste-btn" style="margin-bottom:14px;">Paste from Clipboard</button>
        <div id="paste-error" style="display:none;font-size:10px;color:var(--red);margin-bottom:10px;"></div>
        <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;">
          <div style="font-size:9px;color:var(--dim);margin-bottom:8px;">Or paste manually:</div>
          <textarea id="jin" placeholder="Paste JSON here..."></textarea>
          <button class="go-btn" id="go-btn" style="border-color:var(--gold2);color:var(--gold2);">Analyse Session</button>
        </div>
        <div id="restore-block" style="display:none;" class="restore-block">
          <div class="restore-label" id="restore-label"></div>
          <button class="go-btn" id="restore-btn" style="margin-top:0;border-color:var(--gold2);color:var(--gold2);">Restore Previous Session</button>
        </div>
      </div>
    </div>

    <div id="dash">
      <div class="dash-header">
        <div class="header-inner">
          <div class="header-title">TC Poker Analysis</div>
          <div style="display:flex;align-items:center;gap:16px;">
            <select id="table-filter" style="display:none;" class="table-filter">
              <option value="all">All Tables</option>
            </select>
            <div class="header-meta" id="page-meta" style="cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid transparent;transition:border-color .2s,color .2s;" onmouseover="this.style.borderColor='var(--border)';this.style.color='var(--gold)';" onmouseout="this.style.borderColor='transparent';this.style.color='';" onclick="openProfile()"></div>
            <button class="reset-btn" id="reset-btn">New session</button>
          </div>
        </div>
        <div class="hero-strip" id="hero-strip"></div>
        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="cards">Cards</button>
          <button class="tab" data-tab="position">Position</button>
          <button class="tab" data-tab="street">Street</button>
          <button class="tab" data-tab="actions">Actions</button>
          <button class="tab" data-tab="bets">Bets</button>
          <button class="tab" data-tab="combined">Combined</button>
          <button class="tab" data-tab="range">Range</button>
          <button class="tab" data-tab="tables">Tables</button>
          <button class="tab" data-tab="trends">Trends</button>
          <button class="tab" data-tab="log">Hand Log</button>
        </div>
      </div>

      <div id="sample-note"></div>

      <div class="panel on" id="p-cards"></div>
      <div class="panel" id="p-position"></div>
      <div class="panel" id="p-street"></div>
      <div class="panel" id="p-actions"></div>
      <div class="panel" id="p-bets"></div>
      <div class="panel" id="p-combined"></div>
      <div class="panel" id="p-range"></div>
      <div class="panel" id="p-tables"></div>
      <div class="panel" id="p-trends"></div>
      <div class="panel" id="p-log"></div>
      <div class="panel" id="p-profile"></div>
    </div>
  </div>

  <script src="js/helpers.js"></script>
  <script src="js/analyse.js"></script>
  <script src="js/loader.js"></script>
  <script src="app.js"></script>
</body>

</html>
