<div class="section">
  <div class="section-head">Head-to-Head</div>
  <div class="row">
    <div class="container">
      <div class="row between center wrap">
        <div class="text-body">Compare any two players side by side: stats, head-to-head record, and exploit tips.</div>
        <button class="btn btn-primary" id="open-compare-btn">Compare Players</button>
      </div>
    </div>
  </div>
</div>
<div class="section" data-slot="watchedSection" hidden>
  <div class="section-head">Watched Players</div>
  <div class="row">
    <div class="container">
      <div class="list">
      <div class="text-micro">Click star to unwatch · click row to view hands</div>
      <div class="overflow-x">
        <table class="table">
          <thead data-slot="watchedHead"></thead>
          <tbody data-slot="watchedRows"></tbody>
        </table>
      </div>
      </div>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-head">All Opponents</div>
  <div class="row">
    <div class="container">
      <input type="text" id="player-search" placeholder="Search players…">
      <div class="list">
      <div class="text-micro" data-slot="allMeta"></div>
      <div class="">
        <table class="table">
          <thead data-slot="allHead"></thead>
          <tbody data-slot="allRows"></tbody>
        </table>
      </div>
      </div>
    </div>
  </div>
</div>
