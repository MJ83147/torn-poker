<div class="panel-title">Cards</div>
<div class="text-body panel-desc">Win rates by hand type: pairs, broadway, suited connectors, and more.</div>
<div data-slot="verdict"></div>
<div class="p-row" data-slot="findings" hidden></div>
<div class="p-row">
  <div class="ht-stack-legend">
    <div class="ht-leg-item"><div class="ht-leg-sw leg-sw-won"></div>Won</div>
    <div class="ht-leg-item"><div class="ht-leg-sw leg-sw-played"></div>Played, not won</div>
    <div class="ht-leg-item"><div class="ht-leg-sw leg-sw-unplayed"></div>Dealt, not played</div>
  </div>
  <div data-fill="bars">
    <template data-row>
      <div class="ht-stack-item">
        <div class="flex-between ht-stack-header">
          <span class="text-meta ht-stack-name"></span>
          <span class="text-meta ht-stack-meta"></span>
        </div>
        <div class="ht-stack-track">
          <div class="ht-stack-inner w-100">
            <div class="ht-seg-won"></div>
            <div class="ht-seg-played"></div>
            <div class="ht-seg-unplayed"></div>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
