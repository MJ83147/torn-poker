<div class="legend mt-8 mb-24" data-tour="ht-legend">
  <div class="legend-item"><div class="swatch bg-pos"></div>Won</div>
  <div class="legend-item"><div class="swatch bg-warn"></div>Played, not won</div>
  <div class="legend-item"><div class="swatch bg-muted"></div>Dealt, not played</div>
</div>
<div data-fill="bars" class="col gap-16">
  <template data-row>
    <div class="col gap-6">
      <div class="row between">
        <span class="text-meta" data-name></span>
        <span class="text-meta" data-meta></span>
      </div>
      <div class="bar-stack" data-track>
        <div class="bar-seg bg-pos" data-seg-won></div>
        <div class="bar-seg bg-warn" data-seg-played></div>
        <div class="bar-seg bg-muted" data-seg-unplayed></div>
      </div>
    </div>
  </template>
</div>
