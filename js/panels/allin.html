<div class="section">
  <div class="section-head">All-In Showdowns</div>
  <div class="row">
    <div class="container">
      <div class="box text-center list">
        <div class="stat">
          <div class="title title-xl" data-bind="count"></div>
          <div class="eyebrow">all-in showdown hands detected</div>
        </div>
        <div class="list">
          <button class="btn btn-ghost" id="allin-run-btn">Run Equity Simulation</button>
          <div class="text-meta">Calculates equity for each hand using Monte Carlo simulation</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-head">Detected All-In Hands</div>
  <div class="row">
    <div class="container">
      <div class="overflow-x"><table class="table">
        <thead><tr><th>#</th><th>Hole</th><th>vs</th><th>Board</th><th>Street</th><th>Pot</th><th>Result</th></tr></thead>
        <tbody data-slot="previewRows"></tbody>
      </table></div>
    </div>
  </div>
</div>
