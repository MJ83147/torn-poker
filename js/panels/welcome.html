<div class="style-welcome">
  <div class="style-welcome-inner">
    <div class="eyebrow" data-bind="greeting">Welcome</div>
    <div class="title title-xl">Pick the style you want to target.</div>
    <div class="style-welcome-cards" data-fill="cards">
      <template data-row>
        <button type="button" class="card card-s1 card-link text-left">
          <div class="title title-lg c-gold" data-bind="name"></div>
          <div class="text-body" data-bind="desc"></div>
        </button>
      </template>
    </div>
  </div>
</div>
