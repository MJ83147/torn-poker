<div class="style-welcome">
  <div class="style-welcome-inner">
    <div class="eyebrow c-dim style-welcome-eyebrow" data-bind="greeting">Welcome</div>
    <div class="title title-xl style-welcome-headline">Pick the style you want to target.</div>
    <div class="cols-auto gap-16 style-welcome-cards" data-fill="cards">
      <template data-row>
        <button type="button" class="card card-s1 card-link style-card">
          <div class="title title-lg c-gold style-card-name" data-bind="name"></div>
          <div class="text-meta style-card-desc" data-bind="desc"></div>
        </button>
      </template>
    </div>
  </div>
</div>
