<div class="row between wrap gap-16 mb-16">
  <label class="check text-meta">
    <input type="checkbox" id="cr-compare-toggle">
    <span>Compare two reports</span>
  </label>
  <button class="btn btn-ghost" id="cr-reset-btn">Reset filters</button>
</div>
<div class="box mb-24" data-slot="sentence"></div>
<div data-slot="headline"></div>
<div data-slot="cards"></div>
<div data-slot="chartSection" hidden>
  <div class="cols-auto cr-charts gap-24">
    <div class="box"><div class="eyebrow c-dim mb-8 mt-0">bb/100 over time</div><div class="chart-full"><canvas id="cr-trend"></canvas></div></div>
    <div class="box"><div class="eyebrow c-dim mb-8 mt-0">bb/100 by position</div><div class="chart-full"><canvas id="cr-position"></canvas></div></div>
    <div class="box"><div class="eyebrow c-dim mb-8 mt-0">Win rate by hand class</div><div class="chart-full"><canvas id="cr-cards"></canvas></div></div>
    <div class="box"><div class="eyebrow c-dim mb-8 mt-0">Action breakdown</div><div class="chart-full"><canvas id="cr-actions"></canvas></div></div>
  </div>
</div>
