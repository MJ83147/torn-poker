<div class="panel-title">Custom Report</div>
<div class="text-body panel-desc">Build your own report. Click any underlined word to change it. Add clauses to narrow further.</div>
<div class="cr-toolbar">
  <label class="cr-compare-toggle">
    <input type="checkbox" id="cr-compare-toggle">
    <span>Compare two reports</span>
  </label>
  <button class="btn btn-ghost" id="cr-reset-btn">Reset filters</button>
</div>
<div class="cr-sentence-wrap" data-slot="sentence"></div>
<div class="p-row" data-slot="headline"></div>
<div class="p-row" data-slot="cards"></div>
<div class="p-row" data-slot="chartSection" hidden>
  <div class="grid-auto cr-charts">
    <div class="cr-chart-card"><div class="sec-subtitle mt-0">bb/100 over time</div><div class="chart-wrap-full"><canvas id="cr-trend"></canvas></div></div>
    <div class="cr-chart-card"><div class="sec-subtitle mt-0">bb/100 by position</div><div class="chart-wrap-full"><canvas id="cr-position"></canvas></div></div>
    <div class="cr-chart-card"><div class="sec-subtitle mt-0">Win rate by hand class</div><div class="chart-wrap-full"><canvas id="cr-cards"></canvas></div></div>
    <div class="cr-chart-card"><div class="sec-subtitle mt-0">Action breakdown</div><div class="chart-wrap-full"><canvas id="cr-actions"></canvas></div></div>
  </div>
</div>
